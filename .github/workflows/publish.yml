name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and Publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install uv
          uv build
          # Check if version already exists on PyPI before publishing
          VERSION=$(python3 -c "import re; print(re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml').read()).group(1))")
          if curl -sI "https://pypi.org/project/okf-nav/$VERSION/" | grep -q "200"; then
            echo "Version $VERSION already exists on PyPI — skipping publish."
          else
            uv publish
          fi
